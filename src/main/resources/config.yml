# ----------------------------------- #
#       Vanish++ Configuration        #
# ----------------------------------- #
#
# You can use standard Minecraft color codes with the '&' symbol.
# For example: &c for red, &l for bold.

messages:
  vanish: "&6You are now vanished."
  unvanish: "&6You are no longer vanished."
  no-permission: "&cYou do not have permission to use this command."
  player-not-found: "&cPlayer not found."
  vanished-other: "&6You have vanished %player%."
  unvanished-other: "&6You have unvanished %player%."

  ghost-on: "&bGhost mode enabled. You are now in spectator mode and hidden from normal players."
  ghost-off: "&bGhost mode disabled. Returned to your original state."
  ghost-fail-gamemode: "&cYou must be in survival, creative, or adventure mode to use /ghost."
  ghost-fail-vanished: "&cYou cannot use /ghost while already vanished. Use /vanish to exit vanish mode first."
  vanish-fail-ghosted: "&cYou cannot use /vanish while in ghost mode. Use /ghost to exit."

  # Messages sent to players with the 'vanishpp.see' permission when a vanished player joins or leaves.
  # %player% is a placeholder for the player's name.
  silent-join: "&8[&7+&8] &7%player% has silently joined."
  silent-quit: "&8[&7-&8] &7%player% has silently left."

  # Notifications sent to staff (players with 'vanishpp.see') when another player's vanish state is changed.
  # %player% is the player who vanished. %staff% is the player who executed the command.
  staff-notify:
    enabled: true
    on-vanish: "&e[Staff] %player% has vanished (by %staff%)."
    on-unvanish: "&e[Staff] %player% has unvanished (by %staff%)."

# Appearance settings for vanished players
vanish-appearance:
  prefix: "&7[VANISHED] "
  action-bar:
    enabled: true
    text: "&bYou are currently VANISHED"

# Configuration specific to Ghost Mode (/ghost)
ghost-mode:
  # If true, exiting ghost mode will teleport the player back to where they were when they entered it.
  # If false, they will remain where they are.
  teleport-back-on-exit: false

# How chat from a vanished player is formatted.
chat-format:
  vanished-player-format: "%prefix%&7%player%: %message%"

# General effects applied to vanished players.
vanish-effects:
  hide-from-server-list: true
  fake-leave-message: true
  fake-join-message: true
  disable-block-triggering: true

# What messages/announcements from vanished players should be hidden from normal players.
hide-announcements:
  death-messages: true
  advancements: true


# ----------------------------------- #
#       Plugin Data Storage           #
# ----------------------------------- #
# This section is managed by the plugin. Please do not edit it manually.
data:
  vanished-players: []
  # Stores the state of players in ghost mode so it can be restored on login or after restart.
  ghost-states: {}