# ----------------------------------- #
#       Vanish++ Configuration        #
# ----------------------------------- #

messages:
  vanish: "&6You are now vanished."
  unvanish: "&6You are no longer vanished."
  no-permission: "&cYou do not have permission to use this command."
  player-not-found: "&cPlayer not found."
  vanished-other: "&6You have vanished %player%."
  unvanished-other: "&6You have unvanished %player%."
  silent-chest-blocked: "&cYou cannot open this silently (Inventory Type not supported or protected)."
  pickup-enabled: "&eItem pickup is now &aENABLED&e."
  pickup-disabled: "&eItem pickup is now &cDISABLED&e."
  chat-locked: "&cYou are vanished! &7Type &b/vchat confirm &7to send this message."
  chat-sent: "&aMessage sent."
  no-chat-pending: "&cYou have no pending chat messages to confirm."

  vperms:
    invalid-usage: "&cUsage: /vperms <player> <permission> <set|remove|get>"
    invalid-permission: "&cInvalid permission."
    perm-set: "&aSet permission '%perm%' for %player%."
    perm-removed: "&eRemoved permission '%perm%' from %player%."
    perm-get-has: "&a%player% HAS the permission '%perm%'."
    perm-get-does-not-have: "&c%player% DOES NOT HAVE the permission '%perm%'."
    reload: "&aVanish++ permissions reloaded."

  silent-join: "&8[&7+&8] &7%player% has silently joined."
  silent-quit: "&8[&7-&8] &7%player% has silently left."

  staff-notify:
    enabled: true
    on-vanish: "&e[Staff] %player% has vanished (by %staff%)."
    on-unvanish: "&e[Staff] %player% has unvanished (by %staff%)."

vanish-appearance:
  # Shown in TAB List (if TAB plugin is used, or vanilla list)
  tab-prefix: "&7[VANISHED] "

  # Shown above player head (Scoreboard Team). Leave empty to hide.
  nametag-prefix: ""

  action-bar:
    enabled: true
    text: "&bYou are currently VANISHED"

  adjust-server-list-count: true

chat-format:
  vanished-player-format: "%prefix%&7%player%: %message%"

invisibility-features:
  night-vision: true
  allow-flight: true
  disable-mob-targeting: true
  disable-hunger: true
  silent-chests: true
  ignore-projectiles: true
  prevent-raid-trigger: true
  prevent-sculk-sensors: true
  prevent-trample: true
  hide-from-tab-complete: true
  prevent-sleeping: true
  prevent-entity-interact: true
  prevent-accidental-chat: true

vanish-effects:
  hide-from-server-list: true
  fake-leave-message: true
  fake-join-message: true
  # Should the fake message actually be broadcasted?
  broadcast-fake-quit: true
  broadcast-fake-join: true
  disable-block-triggering: true

hide-announcements:
  death-messages: true
  advancements: true

# Default Rules for players
# Configures what vanished players can do by default.
# Can be overridden per-player with /vrules
default-rules:
  can_break_blocks: false
  can_place_blocks: false
  can_hit_entities: false
  can_pickup_items: false
  can_drop_items: false
  can_trigger_physical: false
  can_interact: true
  can_chat: false
  mob_targeting: false
  show_notifications: true

hooks:
  simple-voice-chat:
    enabled: true
    isolate-vanished-players: true

permissions:
  layered-permissions-enabled: true
  default-vanish-level: 1
  default-see-level: 1
  max-level: 100

data:
  vanished-players: []
  ignored-warnings: []
  rules: {}