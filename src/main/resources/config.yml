# ----------------------------------- #
#       Vanish++ Configuration        #
# ----------------------------------- #
#
# You can use standard Minecraft color codes with the '&' symbol.
# For example: &c for red, &l for bold.

messages:
  vanish: "&6You are now vanished."
  unvanish: "&6You are no longer vanished."
  no-permission: "&cYou do not have permission to use this command."

  # Messages sent to players with the 'vanishpp.see' permission when a vanished player joins or leaves.
  # %player% is a placeholder for the player's name.
  silent-join: "&8[&7+&8] &7%player% has silently joined."
  silent-quit: "&8[&7-&8] &7%player% has silently left."

# Appearance settings for vanished players, visible only to staff with 'vanishpp.see'
vanish-appearance:
  # The prefix that appears before a vanished player's name in tab and above their head.
  prefix: "&7[VANISHED] "

# How chat from a vanished player is formatted.
# This will only be seen by players with the 'vanishpp.see' permission.
chat-format:
  # Placeholders: %prefix%, %player%, %message%
  vanished-player-format: "%prefix%&7%player%: %message%"

# General effects applied to vanished players.
vanish-effects:
  # If true, vanished players will not appear in the player count or the
  # player list when someone pings the server in the multiplayer menu.
  hide-from-server-list: true


# ----------------------------------- #
#       Plugin Data Storage           #
# ----------------------------------- #
# This section is managed by the plugin. Please do not edit it manually.
data:
  vanished-players: []