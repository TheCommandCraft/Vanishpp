name: Vanishpp
version: '1.0'
main: net.thecommandcraft.vanishpp.Vanishpp
api-version: '1.21'
authors: [ tcc ]
description: The better vanish solution!

commands:
  vanish:
    description: Toggles your vanish state.
    usage: /vanish
    aliases: [ v ]

permissions:
  vanishpp.vanish:
    description: Allows a player to use the /vanish command.
    default: op
  vanishpp.see:
    description: Allows a player to see vanished players, their chat, and silent join/quit messages.
    default: op