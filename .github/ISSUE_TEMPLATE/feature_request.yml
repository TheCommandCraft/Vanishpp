name: Feature Request
description: Suggest a new feature or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please check the [existing issues](https://github.com/TheCommandCraft/Vanishpp/issues) to see if this has already been requested.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or limitation you are running into. What can you not do right now?
      placeholder: "I need to be able to X but currently there is no way to do it because Y."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work? Be as specific as you can.
      placeholder: "Add a config option that allows X. When enabled, it should..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you have considered
      description: Any workarounds you have tried, or other ways this could be implemented.
    validations:
      required: false

  - type: dropdown
    id: server-software
    attributes:
      label: Server software
      description: Which platforms should this feature support?
      multiple: true
      options:
        - Paper
        - Purpur
        - Folia
        - Spigot
        - Bukkit
        - All
    validations:
      required: true
