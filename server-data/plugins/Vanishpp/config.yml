# ------------------------------------------------------------- #
#                                                               #
#                    Vanish++ Configuration                     #
#                                                               #
# ------------------------------------------------------------- #

# --- [ SYSTEM ] ---
# The language to use (e.g., en, de). Lang files are in the 'lang' folder.
language: en

# Configuration Version (Internal use for migrations)
config-version: 6

# --- [ MESSAGES ] ---
# Most messages have been moved to the language files in the 'lang' folder.
# You can still override specific system behaviors here.
messages:
  # Fake Join/Quit (Visible to normal players to simulate staff leaving/joining)
  # Leave empty to use system defaults.
  fake-join: ""
  fake-quit: ""

  # Staff Notifications (Broadcasts vanish status changes to other staff)
  staff-notify:
    # Whether staff should be notified when others change vanish status.
    enabled: true

# --- [ APPEARANCE ] ---
# Visual indicators for vanished players.
vanish-appearance:
  # Prefix shown in the Tab List (and chat for staff).
  tab-prefix: "&7[VANISHED] "

  # Prefix shown above the player's head (via Scoreboard Teams).
  # Note: This is only visible to those who can see the vanished player.
  nametag-prefix: ""

  # Action Bar announcement while vanished.
  action-bar:
    # If true, a persistent message will show in the action bar.
    enabled: true
    # The text shown in the action bar.
    text: "&bYou are currently VANISHED"

  # Whether to hide vanished players from the server's online player count.
  adjust-server-list-count: true

# --- [ FLIGHT MANAGEMENT ] ---
# Configuration for flight behavior relating to vanish status.
flight-control:
  # If true, flight is automatically enabled when the player vanishes.
  vanish-enable-fly: true
  
  # If true, flight is automatically disabled when the player unvanishes.
  # If false, players with external fly permissions (like rank-based fly) 
  # will retain their flight status after unvanishing.
  unvanish-disable-fly: true

# --- [ CHAT SETTINGS ] ---
chat-format:
  # How vanished players appear in chat to those who can see them.
  vanished-player-format: "%prefix%&7%player%: %message%"

# --- [ INVISIBILITY FEATURES ] ---
# Core logic for hiding player interactions.
invisibility-features:
  # Whether vanished players are invincible.
  god-mode: true
  
  # Whether to block splash/lingering potion effects from hitting vanished players.
  prevent-potion-effects: true
  
  # Give vanished players automatic night vision.
  night-vision: true
  
  # Prevent mobs from targeting vanished players.
  disable-mob-targeting: true
  
  # Prevent hunger loss while vanished.
  disable-hunger: true
  
  # Allow opening containers without animations or sounds.
  silent-chests: true
  
  # Arrows and other projectiles fly THROUGH vanished players.
  ignore-projectiles: true
  
  # Prevent vanished players from triggering village raids.
  prevent-raid-trigger: true
  
  # Prevent triggering sculk sensors.
  prevent-sculk-sensors: true
  
  # Prevent trampling crops and turtle eggs.
  prevent-trample: true
  
  # Hide vanished players from tab-completion in commands.
  hide-from-tab-complete: true
  
  # Prevent vanished players from sleeping in beds.
  prevent-sleeping: true
  
  # Prevent interacting with entities (e.g., riding horses) while vanished.
  prevent-entity-interact: true
  
  # If true, players must confirm chat messages to avoid accidental voice leaks.
  prevent-accidental-chat: true

# --- [ VANISH EFFECTS ] ---
# Advanced packet-level hiding techniques.
vanish-effects:
  # Hide player from the server list hover (sample).
  hide-from-server-list: true
  
  # Block the REAL vanilla quit messages.
  hide-real-quit-messages: true
  
  # Block the REAL vanilla join messages.
  hide-real-join-messages: true
  
  # Broadcast the FAKE quit message (fake-quit) when a player vanishes.
  broadcast-fake-quit: true
  
  # Broadcast the FAKE join message (fake-join) when a player unvanishes.
  broadcast-fake-join: true
  
  # Prevent vanished players from triggering physical pressure plates/buttons.
  disable-block-triggering: true

# --- [ GLOBAL HIDING ] ---
hide-announcements:
  # Hide death messages of vanished players.
  death-messages: true
  
  # Hide advancement announcements for vanished players.
  advancements: true
  
  # Hide the plugin itself from /plugins (for non-staff).
  hide-from-plugin-list: true

# --- [ DEFAULT RULES ] ---
# What vanished players can do by default. (Override with /vrules)
default-rules:
  can_break_blocks: false
  can_place_blocks: false
  can_hit_entities: false
  can_pickup_items: false
  can_drop_items: false
  can_trigger_physical: false
  can_interact: true
  can_chat: false
  mob_targeting: false
  show_notifications: true

# --- [ HOOKS ] ---
hooks:
  simple-voice-chat:
    enabled: true
    isolate-vanished-players: true
  essentials:
    # Use EssentialsX custom join/quit messages if configured.
    simulate-join-leave: false

# --- [ STORAGE ] ---
# How player data (vanish status, rules, levels) is stored.
storage:
  # Options: YAML, MYSQL, POSTGRESQL
  type: "YAML"
  
  # Configuration for MYSQL and POSTGRESQL
  mysql:
    host: "localhost"
    port: 3306
    database: "vanishpp"
    username: "root"
    password: ""
    use-ssl: false
    pool-size: 10

  # Configuration for Redis (Enables cross-server synchronization)
  redis:
    enabled: false
    host: "localhost"
    port: 6379
    password: ""

# --- [ PERMISSIONS ] ---
permissions:
  layered-permissions-enabled: true
  default-vanish-level: 1
  default-see-level: 1
  max-level: 100
