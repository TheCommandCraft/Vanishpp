# ------------------------------------------------------------- #
#                                                               #
#                    Vanish++ Configuration                     #
#                                                               #
# ------------------------------------------------------------- #


# Configuration Version (Internal use for migrations)
config-version: 8

# --- [ MESSAGES ] ---
# Most messages have been moved to the language files in the 'lang' folder.
# You can still override specific system behaviors here.
messages:
  # Fake Join/Quit (Visible to normal players to simulate staff leaving/joining)
  # Leave empty to use system defaults.
  fake-join: ""
  fake-quit: ""

  # Staff Notifications (Broadcasts vanish status changes to other staff)
  staff-notify:
    # Whether staff should be notified when others change vanish status.
    enabled: true

# --- [ APPEARANCE ] ---
# Visual indicators for vanished players.
vanish-appearance:
  # Prefix shown in the Tab List (and chat for staff).
  tab-prefix: "&7[VANISHED] "

  # Prefix shown above the player's head (via Scoreboard Teams).
  # Visible to players with vanishpp.see who have the vanished player shown to them.
  nametag-prefix: "&7[V] "

  # Action Bar announcement while vanished.
  action-bar:
    # If true, a persistent message will show in the action bar.
    enabled: true
    # The text shown in the action bar.
    text: "&bYou are currently VANISHED"

  # Whether to hide vanished players from the server's online player count.
  adjust-server-list: true

  # If true, staff with vanishpp.see will see a glowing outline around vanished players.
  # The glow is injected per-packet via ProtocolLib and is invisible to non-staff.
  # Requires ProtocolLib.
  staff-glow: true

# --- [ SPECTATOR MODE ] ---
# Double-tap shift while vanished to enter spectator mode, double-tap again to return.
# Toggle per-player with: /vrules spectator_gamemode true/false
# Bypass forced-restore on unvanish with: vanishpp.spectator.bypass
vanish-gamemodes:
  # Master switch. If false, the spectator quick-switch is disabled for everyone.
  enabled: true

# --- [ FLIGHT MANAGEMENT ] ---
# Configuration for flight behavior relating to vanish status.
flight-control:
  # If true, flight is automatically enabled when the player vanishes.
  vanish-enable-fly: true
  
  # If true, flight is automatically disabled when the player unvanishes.
  # If false, players with external fly permissions (like rank-based fly) 
  # will retain their flight status after unvanishing.
  unvanish-disable-fly: true

# --- [ CHAT SETTINGS ] ---
chat-format:
  # How vanished players appear in chat to those who can see them.
  vanished-player-format: "%prefix%&7%player%: %message%"

# --- [ INVISIBILITY FEATURES ] ---
# Core logic for hiding player interactions.
invisibility-features:
  # Whether vanished players are invincible.
  god-mode: true
  
  # Whether to block splash/lingering potion effects from hitting vanished players.
  prevent-potion-effects: true
  
  # Give vanished players automatic night vision.
  night-vision: true
  
  # Prevent mobs from targeting vanished players.
  disable-mob-targeting: true
  
  # Prevent hunger loss while vanished.
  disable-hunger: true
  
  # Allow opening containers without animations or sounds.
  silent-chests: true
  
  # Arrows and other projectiles fly THROUGH vanished players.
  ignore-projectiles: true
  
  # Prevent vanished players from triggering village raids.
  prevent-raid-trigger: true
  
  # Prevent triggering sculk sensors.
  prevent-sculk-sensors: true
  
  # Prevent trampling crops and turtle eggs.
  prevent-trample: true
  
  # Hide vanished players from tab-completion in commands.
  hide-from-tab-complete: true
  
  # Prevent vanished players from sleeping in beds.
  prevent-sleeping: true
  
  # Prevent interacting with entities (e.g., riding horses) while vanished.
  prevent-entity-interact: true
  
  # If true, players must confirm chat messages to avoid accidental voice leaks.
  prevent-accidental-chat: true

# --- [ VANISH EFFECTS ] ---
# Advanced packet-level hiding techniques.
vanish-effects:
  # Hide player from the server list hover (sample).
  hide-from-server-list: true
  
  # Block the REAL vanilla quit messages.
  hide-real-quit-messages: true
  
  # Block the REAL vanilla join messages.
  hide-real-join-messages: true
  
  # Broadcast the FAKE quit message (fake-quit) when a player vanishes.
  broadcast-fake-quit: true
  
  # Broadcast the FAKE join message (fake-join) when a player unvanishes.
  broadcast-fake-join: true
  
  # Prevent vanished players from triggering physical pressure plates/buttons.
  disable-block-triggering: true

# --- [ GLOBAL HIDING ] ---
hide-announcements:
  # Hide death messages of vanished players.
  death-messages: true
  
  # Hide advancement announcements for vanished players.
  advancements: true
  
  # Hide the plugin itself from /plugins (for non-staff).
  hide-from-plugin-list: true

# --- [ DEFAULT RULES ] ---
# What vanished players can do by default. (Override with /vrules)
default-rules:
  can_break_blocks: false
  can_place_blocks: false
  can_hit_entities: false
  can_pickup_items: false
  can_drop_items: false
  can_trigger_physical: false
  can_interact: true
  can_throw: false
  can_chat: false
  mob_targeting: false
  show_notifications: true
  spectator_gamemode: true

# --- [ HOOKS ] ---
hooks:
  simple-voice-chat:
    enabled: true
    isolate-vanished-players: true
  essentials:
    # Use EssentialsX custom join/quit messages if configured.
    simulate-join-leave: false

# --- [ STORAGE ] ---
# How player data (vanish status, rules, levels) is stored.
storage:
  # Options: YAML, MYSQL, POSTGRESQL
  type: "YAML"
  
  # Configuration for MYSQL and POSTGRESQL
  mysql:
    host: "localhost"
    port: 3306
    database: "vanishpp"
    username: "root"
    password: ""
    use-ssl: false
    pool-size: 10

  # Configuration for Redis (Enables cross-server synchronization)
  redis:
    enabled: false
    host: "localhost"
    port: 6379
    password: ""

# --- [ SCOREBOARD ] ---
# Shows a sidebar scoreboard with useful info while vanished.
# Customize layout and lines in scoreboards.yml.
scoreboard:
  # Master switch.
  enabled: true
  # Automatically show when vanishing, hide when unvanishing.
  # Players can still toggle manually with /vsb regardless of this setting.
  auto-show-on-vanish: true

# --- [ ANTI-COMBAT VANISH ] ---
# Prevent staff from vanishing immediately after combat.
anti-combat-vanish:
  enabled: false
  # Seconds after PvP damage before vanish is allowed again.
  pvp-cooldown-seconds: 10
  # Seconds after PvE damage before vanish is allowed again.
  pve-cooldown-seconds: 5

# --- [ VANISH RATE LIMIT ] ---
# Prevent rapid vanish/unvanish toggling.
vanish-rate-limit:
  enabled: false
  # Minimum seconds between consecutive vanish toggles.
  seconds: 3

# --- [ TIMED VANISH ] ---
# Allow vanish with an automatic expiry timer (/vanish <player> <duration>).
timed-vanish:
  enabled: true

# --- [ STAFF SOUNDS ] ---
# Play sounds to staff on vanish events.
staff-sounds:
  enabled: false
  # Sound played to all vanishpp.see holders when a player vanishes.
  vanish:
    sound: "BLOCK_NOTE_BLOCK_PLING"
    volume: 1.0
    pitch: 1.2
  # Sound played to all vanishpp.see holders when a player unvanishes.
  unvanish:
    sound: "BLOCK_NOTE_BLOCK_PLING"
    volume: 1.0
    pitch: 0.8
  # Sound played to vanishpp.see holders when a vanished player silently joins.
  silent-join:
    sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
    volume: 0.6
    pitch: 1.3
  # Sound played to vanishpp.see holders when a vanished player silently quits.
  silent-quit:
    sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
    volume: 0.6
    pitch: 0.7

# --- [ BOSSBAR ] ---
# Show a bossbar to the vanished player as a status indicator.
bossbar:
  enabled: true
  title: "&7[Vanished]"
  color: "BLUE"
  style: "SOLID"

# --- [ VANISH HISTORY ] ---
# Audit log of vanish/unvanish events.
vanish-history:
  enabled: true
  # Days to keep history entries. Set to 0 to keep forever.
  retention-days: 30

# --- [ PER-WORLD RULE DEFAULTS ] ---
# Override default vanish rules for specific worlds.
# world-rules:
#   world_nether:
#     can_break_blocks: true
#   world_the_end:
#     mob_targeting: true
world-rules: {}

# --- [ WEBHOOK ] ---
# POST vanish/unvanish events to external URLs (e.g., Discord bots, dashboards).
webhook:
  enabled: false
  urls: []
  # Template variables: {player}, {uuid}, {action}, {reason}, {server}, {timestamp}
  payload-template: '{"player":"{player}","action":"{action}","reason":"{reason}","server":"{server}","timestamp":"{timestamp}"}'
  # Optional Authorization header value (e.g., "Bearer mytoken")
  auth-header: ""

# --- [ WORLDGUARD ] ---
worldguard:
  enabled: true

# --- [ AFK AUTO-VANISH ] ---
afk-auto-vanish:
  enabled: false
  # Seconds of no movement before auto-vanishing.
  seconds: 300

# --- [ VANISH WAND ] ---
vanish-wand:
  enabled: true
  material: "BLAZE_ROD"
  display-name: "&6✦ Vanish Wand"

# --- [ INCOGNITO ] ---
incognito:
  # Pool of fake names to randomly assign. Must be valid (≤16 chars).
  fake-names:
    - "Steve"
    - "Alex"
    - "Notch"
    - "Herobrine"
    - "Jeb_"
    - "Dinnerbone"
    - "grumm"
    - "Technoblade"

# --- [ UPDATE CHECKER ] ---
update-checker:
  # Whether to check for plugin updates on startup.
  enabled: true
  # Modrinth project ID or slug.
  modrinth-id: "vanishpp"
  # How to decide who gets update notifications: PERMISSION or LIST.
  notify-mode: "PERMISSION"
  # If notify-mode is LIST, only these players get notifications.
  notify-list: []
  # Notify staff about beta builds (true = yes, false = releases only).
  show-beta: true
  # Notify staff about alpha builds (true = yes, false = skip alphas).
  show-alpha: true

# --- [ PERMISSIONS ] ---
permissions:
  layered-permissions-enabled: true
  default-vanish-level: 1
  default-see-level: 1
  max-level: 100

# --- [ PROXY ] ---
# Cross-server / Velocity proxy settings.
proxy:
  # Internal name used for proxy registration. Leave blank to auto-detect (IP:port).
  server-name: ""
  # If true, /vlist shows vanished players from all connected servers.
  cross-server-list: true
  # Notify staff (vanishpp.see) on THIS server when a player vanishes on ANOTHER server.
  broadcast-vanish-events: true
  # Minimum vanish level required before the cross-server broadcast is sent.
  broadcast-min-level: 1
