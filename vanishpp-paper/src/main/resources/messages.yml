unknown-command: "&cUnknown command. Type \"/help\" for help."

# --- [ VANISH COMMANDS ] ---
vanish:
  self: "&6You are now vanished."
  others: "&6You have vanished %player%."
  unvanish-self: "&6You are no longer vanished."
  unvanish-others: "&6You have unvanished %player%."

# --- [ VPERMS COMMAND ] ---
vperms:
  reload: "&aVanish++ permissions reloaded."
  invalid-usage: "&cUsage: /vperms <player> <permission> <set|remove|get>"
  invalid-permission: "&cInvalid permission."
  perm-set: "&aSet permission '%perm%' for %player%."
  perm-removed: "&eRemoved permission '%perm%' from %player%."
  perm-get-has: "&a%player% HAS the permission '%perm%'."
  perm-get-does-not-have: "&c%player% DOES NOT HAVE the permission '%perm%'."

# --- [ UPDATE CHECKER ] ---
update:
  available: "&a&lVanish++ Update Available!"
  current: "&7Current: &c%version%"
  latest: "&7Latest: &a%version%"
  download: "&6&l[CLICK TO DOWNLOAD]"
  hover: "&eGo to Modrinth Version %version%"
  # Proxy update notification — shown when the Velocity proxy plugin has an update
  proxy-available: "&a&lVanish++ Proxy Update Available!"
  proxy-note: "&7The &eVelocity proxy plugin &7needs updating — not this server's plugin."
  proxy-current: "&7Proxy running: &c%version%"
  proxy-latest: "&7New proxy version: &a%version%"
  proxy-download: "&6&l[DOWNLOAD PROXY UPDATE]"
  proxy-hover: "&eDownload Vanish++ Velocity %version% from Modrinth"

# --- [ RULES COMMAND ] ---
rules:
  usage: "&cUsage: /vrules [player] <rule> [true|false] [seconds] &7— omit seconds for permanent"
  invalid-name: "&cInvalid rule name. Use /vrules to see available rules."
  invalid-value: "&cValue must be 'true' or 'false'."
  invalid-seconds: "&cInvalid number of seconds."
  header: "&6Rules for %player%:"
  line: " • %rule%: <%color%>%status%"
  status-on: "ENABLED"
  status-off: "DISABLED"
  set: "&aRule '%rule%' for %player% set to %status%."
  set-temp: "&aRule '%rule%' for %player% set to %status% for %seconds%s."
  expired: "&eTemporary rule '%rule%' has expired."

# --- [ CHAT ] ---
chat:
  locked: "<red>You are vanished! <gray>Click <click:run_command:'/vchat confirm'><aqua><underlined>[Confirm Send]</underlined></aqua></click> <gray>to send this message."
  sent: "&aMessage sent."
  no-pending: "&cYou have no pending chat messages to confirm."
  usage: "&7Usage: &b/vchat confirm &7— send your pending vanish chat message."

# --- [ PICKUP ] ---
