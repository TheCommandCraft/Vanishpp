# Vanish++ English Language File
# Use MiniMessage tags (<red>, <bold>, etc.) and PlaceholderAPI %placeholders%.

# --- [ GENERAL ] ---
no-permission: "<red>You do not have permission to use this command."
player-not-found: "<red>Player not found."
invalid-usage: "<red>Usage: %usage%"

# --- [ VANISH COMMANDS ] ---
vanish:
  self: "<gold>You are now vanished."
  others: "<gold>You have vanished %player%."
  unvanish-self: "<gold>You are no longer vanished."
  unvanish-others: "<gold>You have unvanished %player%."
  other-vanished: "&6You have vanished %player%." # Legacy key for compatibility if needed
  other-unvanished: "&6You have unvanished %player%." # Legacy key for compatibility if needed

# --- [ VPERMS COMMAND ] ---
vperms:
  reload: "<green>Vanish++ permissions reloaded."
  invalid-usage: "<red>Usage: /vperms <player> <permission> <set|remove|get>"
  invalid-permission: "<red>Invalid permission."
  perm-set: "<green>Set permission '%perm%' for %player%."
  perm-removed: "<yellow>Removed permission '%perm%' from %player%."
  perm-get-has: "<green>%player% HAS the permission '%perm%'."
  perm-get-does-not-have: "<red>%player% DOES NOT HAVE the permission '%perm%'."

# --- [ UPDATE CHECKER ] ---
update:
  available: "<green><bold>Vanish++ Update Available!"
  current: "<gray>Current: <red>%version%"
  latest: "<gray>Latest: <green>%version%"
  download: "<gold><bold>[CLICK TO DOWNLOAD]"
  hover: "<yellow>Go to Modrinth Version %version%"

# --- [ RULES COMMAND ] ---
rules:
  usage: "<red>Usage: /vrules [player] <rule> [true|false] [seconds]"
  invalid-name: "<red>Invalid rule name."
  invalid-value: "<red>Value must be 'true' or 'false'."
  invalid-seconds: "<red>Invalid seconds."
  header: "<gold>Rules for %player%:"
  line: " • %rule%: <%color%>%status%"
  status-on: "ENABLED"
  status-off: "DISABLED"
  set: "<green>Rule '%rule%' for %player% set to %status%."
  set-temp: "<green>Rule '%rule%' for %player% set to %status% for %seconds%s."
  expired: "<yellow>Temporary rule '%rule%' has expired."

# --- [ CHAT & PICKUP ] ---
chat:
  locked: "<red>You are vanished! <gray>Type <click:run_command:/vchat confirm><hover:show_text:'<green>Send this message anyway'><green><bold>[CONFIRM]</bold></green></hover></click> <gray>or </gray><click:run_command:/vrules can_chat true><hover:show_text:'<gold>Enable chat in rules'><gold><bold>[ENABLE CHAT]</bold></gold></hover></click>"
  sent: "<green>Message sent."
  no-pending: "<red>You have no pending chat messages to confirm."
pickup:
  enabled: "<yellow>Item pickup is now <green>ENABLED<yellow>."
  disabled: "<yellow>Item pickup is now <red>DISABLED<yellow>."
  blocked-actionbar: "<red>✖ Item Pickup Blocked"

# --- [ WARNINGS & REPORTS ] ---
warnings:
  protocollib-missing-title: "<red>⚠ WARNING ⚠"
  protocollib-missing-subtitle: "<yellow>ProtocolLib Missing!"
  box-top: "<dark_red><bold>█▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀█"
  header: "<red><bold> CRITICAL DEPENDENCY MISSING"
  line: "<yellow> ProtocolLib is NOT installed."
  sub: "<red> ⚠ YOU ARE NOT FULLY HIDDEN! ⚠"
  box-bottom: "<dark_red><bold>█▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄█"
  action-blocked-actionbar: "<red><bold>✖ Action Blocked: %action%"
  vanish-blocked: "<red>Vanish blocked %action%. <click:run_command:/vrules %rule% true><hover:show_text:'<green>Enable this rule'><green><bold>[ENABLE]</bold></green></hover></click> <gray>| </gray><click:run_command:/vrules %rule% true 60><hover:show_text:'<yellow>Enable for 1 minute'><yellow><bold>[ENABLE 1m]</bold></yellow></hover></click>"
  ignore-tip: "<gray>Tip: Type <click:suggest_command:/vignore><aqua>/vignore</aqua></click> to disable these warnings."

# --- [ STAFF NOTIFICATIONS ] ---
staff:
  silent-join: "<dark_gray>[<gray>+<dark_gray>] <gray>%player% has silently joined."
  silent-quit: "<dark_gray>[<gray>-<dark_gray>] <gray>%player% has silently left."
  notify-vanish: "<yellow>[Staff] %player% has vanished (by %staff%)."
  notify-unvanish: "<yellow>[Staff] %player% has unvanished (by %staff%)."

# --- [ APPEARANCE ] ---
appearance:
  action-bar: "<aqua>You are currently VANISHED"
  vanished-player-format: "%prefix%&7%player%: %message%"

# --- [ MISCELLANEOUS ] ---
config:
  reloaded: "<green>Vanish++ configuration reloaded successfully!"
  updated: "<green>Successfully updated %path% to %value%"
  invalid-path: "<red>Invalid config path!"
  current-value: "<gold>%path% is currently: <white>%value%"
  no-vanished-online: "<yellow>There are no vanished players online."
  vanished-list-header: "<gold>Vanished Players (%count%):"
acknowledgement:
  acknowledged: "<green>Notification acknowledged."
  hiding-dismissed: "<gray>Notification dismissed for this version."
  hiding-visible: "<green>Vanish++ is now VISIBLE in the plugin list."
ignore-warning:
  protocol-denied: "<red>Permission denied."
  player-not-found: "<red>Player not found."
  console-specify: "<red>Console must specify a player."
  enabled: "<green>You will now receive ProtocolLib warnings again."
  disabled: "<red>You will no longer receive ProtocolLib warnings."
  others-enabled: "<green>%player% will receive warnings."
  others-disabled: "<red>%player% will ignore warnings."

# --- [ SILENT CHEST ] ---
silent-chest:
  blocked: "<red>You cannot open this silently (Inventory Type not supported or protected)."
