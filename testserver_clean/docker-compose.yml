services:
  mc:
    image: itzg/minecraft-server:latest
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "1.21.11"
      MEMORY: "2G"
      JVM_XX_OPTS: "-Xms512M"
    volumes:
      - ./plugins:/data/plugins
      - ./world:/data/world
      - ./world_nether:/data/world_nether
      - ./world_the_end:/data/world_the_end
      - ./ops.json:/data/ops.json
      - ./server.properties:/data/server.properties
    restart: unless-stopped
