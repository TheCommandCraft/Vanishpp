# Vanish++ English Language File
# Use Minecraft color codes (&c, &a, etc.) and PlaceholderAPI %placeholders%.

# --- [ GENERAL ] ---
no-permission: "&cYou do not have permission to use this command."
player-not-found: "&cPlayer not found."
invalid-usage: "&cUsage: %usage%"

# --- [ VANISH COMMANDS ] ---
vanish:
  self: "&6You are now vanished."
  others: "&6You have vanished %player%."
  unvanish-self: "&6You are no longer vanished."
  unvanish-others: "&6You have unvanished %player%."
  other-vanished: "&6You have vanished %player%." # Legacy key for compatibility if needed
  other-unvanished: "&6You have unvanished %player%." # Legacy key for compatibility if needed

# --- [ VPERMS COMMAND ] ---
vperms:
  reload: "&aVanish++ permissions reloaded."
  invalid-usage: "&cUsage: /vperms <player> <permission> <set|remove|get>"
  invalid-permission: "&cInvalid permission."
  perm-set: "&aSet permission '%perm%' for %player%."
  perm-removed: "&eRemoved permission '%perm%' from %player%."
  perm-get-has: "&a%player% HAS the permission '%perm%'."
  perm-get-does-not-have: "&c%player% DOES NOT HAVE the permission '%perm%'."

# --- [ UPDATE CHECKER ] ---
update:
  available: "&a&lVanish++ Update Available!"
  current: "&7Current: &c%version%"
  latest: "&7Latest: &a%version%"
  download: "&6&l[CLICK TO DOWNLOAD]"
  hover: "&eGo to Modrinth Version %version%"

# --- [ RULES COMMAND ] ---
rules:
  usage: "&cUsage: /vrules [player] <rule> [true|false] [seconds]"
  invalid-name: "&cInvalid rule name."
  invalid-value: "&cValue must be 'true' or 'false'."
  invalid-seconds: "&cInvalid seconds."
  header: "&6Rules for %player%:"
  line: " • %rule%: %color%%status%"
  status-on: "ENABLED"
  status-off: "DISABLED"
  set: "&aRule '%rule%' for %player% set to %status%."
  set-temp: "&aRule '%rule%' for %player% set to %status% for %seconds%s."
  expired: "&eTemporary rule '%rule%' has expired."

# --- [ CHAT & PICKUP ] ---
chat:
  locked: "&cYou are vanished! &7Type &b/vchat confirm &7to send this message."
  sent: "&aMessage sent."
  no-pending: "&cYou have no pending chat messages to confirm."
pickup:
  enabled: "&eItem pickup is now &aENABLED&e."
  disabled: "&eItem pickup is now &cDISABLED&e."
  blocked-actionbar: "&c✖ Item Pickup Blocked"

